<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealCraft - Food Delivery Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2f3542;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .auth-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
      color: #ffffff;
      padding: 40px;
      text-align: center;
    }

    .auth-header .logo {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .auth-header h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .auth-header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .auth-body {
      padding: 40px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #2f3542;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #dfe4ea;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ff4757;
      box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
    }

    .input-group input::placeholder {
      color: #747d8c;
      opacity: 0.6;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
      color: #ffffff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-google {
      background: #ffffff;
      color: #2f3542;
      border: 2px solid #dfe4ea;
    }

    .btn-google:hover {
      background: #f8f9fa;
      border-color: #4285f4;
    }

    .btn-google svg {
      fill: #4285f4;
    }

    .auth-toggle {
      text-align: center;
      margin: 20px 0;
      color: #747d8c;
    }

    .auth-toggle a {
      color: #ff4757;
      text-decoration: none;
      font-weight: 600;
      margin-left: 5px;
      cursor: pointer;
    }

    .auth-toggle a:hover {
      text-decoration: underline;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #dfe4ea;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .divider span {
      background: #ffffff;
      padding: 0 10px;
      color: #747d8c;
      font-size: 0.9rem;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .message.error {
      display: block;
      background: #fff5f5;
      color: #ff4757;
      border: 1px solid #ff4757;
    }

    .message.success {
      display: block;
      background: #f0fff4;
      color: #2ed573;
      border: 1px solid #2ed573;
    }

    .admin-demo {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      border-left: 4px solid #ff4757;
    }

    .admin-demo p {
      font-size: 0.9rem;
      color: #747d8c;
      margin-bottom: 5px;
    }

    .admin-demo strong {
      color: #2f3542;
    }

    .quick-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .quick-btn {
      flex: 1;
      padding: 8px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .quick-btn:hover {
      background: #ff2e3a;
    }

    @media (max-width: 480px) {
      .auth-body {
        padding: 30px 20px;
      }
      .auth-header {
        padding: 30px 20px;
      }
      .auth-header h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="logo">MealCraft</h1>
        <h2 id="title">Welcome Back</h2>
        <p id="subtitle">Sign in to continue to MealCraft</p>
      </div>

      <div class="auth-body">
        <div class="input-group" id="usernameGroup" style="display: none;">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
        </div>

        <div class="input-group" id="confirmPasswordGroup" style="display: none;">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>

        <button class="btn btn-primary" id="mainBtn" onclick="handleAuth()">Sign In</button>

        <div class="auth-toggle">
          <span id="toggleText">Don't have an account?</span>
          <a href="#" onclick="toggleAuthMode()" id="toggleLink">Create Account</a>
        </div>

        <div class="divider">
          <span>or</span>
        </div>

        <button class="btn btn-google" onclick="googleLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <div class="admin-demo">
          <p><strong>Admin Demo:</strong> admin@mealcraft.com / admin123</p>
          <p><strong>Customer Demo:</strong> user@test.com / password123</p>
          <div class="quick-actions">
            <button class="quick-btn" onclick="createAdminAccount()">Create Admin Account</button>
            <button class="quick-btn" onclick="createTestUser()">Create Test User</button>
          </div>
        </div>

        <div id="message" class="message"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAT4CDao7eHCFU0OO_dee_m6BpjzKv_308",
      authDomain: "mealcraft-9db35.firebaseapp.com",
      projectId: "mealcraft-9db35",
      messagingSenderId: "1052912873454",
      appId: "1:1052912873454:web:2b794eb8e9524f0ba068ff"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const elements = {
      title: document.getElementById('title'),
      subtitle: document.getElementById('subtitle'),
      usernameGroup: document.getElementById('usernameGroup'),
      confirmPasswordGroup: document.getElementById('confirmPasswordGroup'),
      mainBtn: document.getElementById('mainBtn'),
      toggleText: document.getElementById('toggleText'),
      toggleLink: document.getElementById('toggleLink'),
      message: document.getElementById('message'),
      username: document.getElementById('username'),
      email: document.getElementById('email'),
      password: document.getElementById('password'),
      confirmPassword: document.getElementById('confirmPassword')
    };

    let isSignup = false;

    window.toggleAuthMode = () => {
      isSignup = !isSignup;
      clearMessage();
      
      if (isSignup) {
        elements.title.textContent = 'Create Account';
        elements.subtitle.textContent = 'Join MealCraft today';
        elements.mainBtn.textContent = 'Sign Up';
        elements.toggleText.textContent = 'Already have an account?';
        elements.toggleLink.textContent = 'Sign In';
        elements.usernameGroup.style.display = 'block';
        elements.confirmPasswordGroup.style.display = 'block';
      } else {
        elements.title.textContent = 'Welcome Back';
        elements.subtitle.textContent = 'Sign in to continue';
        elements.mainBtn.textContent = 'Sign In';
        elements.toggleText.textContent = 'Don\'t have an account?';
        elements.toggleLink.textContent = 'Create Account';
        elements.usernameGroup.style.display = 'none';
        elements.confirmPasswordGroup.style.display = 'none';
      }
    };

    window.handleAuth = () => {
      if (isSignup) {
        signup();
      } else {
        login();
      }
    };

    const login = async () => {
      const email = elements.email.value.trim();
      const password = elements.password.value;

      if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (!isValidEmail(email)) {
        showMessage('Please enter a valid email address', 'error');
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        
        // Check if admin
        if (email === 'admin@mealcraft.com') {
          window.location.href = 'pages/admin.html';
        } else {
          window.location.href = 'pages/home.html';
        }
      } catch (error) {
        if (error.code === 'auth/user-not-found') {
          showMessage('Account not found. Please sign up first or use the "Create Admin Account" button.', 'error');
        } else {
          handleAuthError(error);
        }
      }
    };

    const signup = async () => {
      const username = elements.username.value.trim();
      const email = elements.email.value.trim();
      const password = elements.password.value;
      const confirmPassword = elements.confirmPassword.value;

      if (!username || !email || !password || !confirmPassword) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (!isValidEmail(email)) {
        showMessage('Please enter a valid email address', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters long', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        
        // Update profile with username
        await updateProfile(userCredential.user, {
          displayName: username
        });

        // Create user document in Firestore
        await setDoc(doc(db, 'users', userCredential.user.uid), {
          email: email,
          username: username,
          role: email === 'admin@mealcraft.com' ? 'admin' : 'customer',
          createdAt: new Date(),
          updatedAt: new Date()
        });

        sessionStorage.setItem('tempUsername', username);
        
        if (email === 'admin@mealcraft.com') {
          window.location.href = 'pages/admin.html';
        } else {
          window.location.href = 'pages/role.html';
        }
      } catch (error) {
        handleAuthError(error);
      }
    };

    window.googleLogin = async () => {
      const provider = new GoogleAuthProvider();
      
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Check if user exists in Firestore
        await setDoc(doc(db, 'users', user.uid), {
          email: user.email,
          username: user.displayName || 'Google User',
          role: 'customer',
          createdAt: new Date(),
          updatedAt: new Date()
        }, { merge: true });

        window.location.href = 'pages/home.html';
      } catch (error) {
        handleAuthError(error);
      }
    };

    // Create admin account
    window.createAdminAccount = async () => {
      const email = 'admin@mealcraft.com';
      const password = 'admin123';
      const username = 'Admin';

      try {
        // Check if admin already exists
        try {
          await signInWithEmailAndPassword(auth, email, password);
          showMessage('Admin account already exists! Logging in...', 'success');
          setTimeout(() => {
            window.location.href = 'pages/admin.html';
          }, 1500);
          return;
        } catch (error) {
          // Admin doesn't exist, create it
          if (error.code === 'auth/user-not-found') {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            
            await updateProfile(userCredential.user, {
              displayName: username
            });

            await setDoc(doc(db, 'users', userCredential.user.uid), {
              email: email,
              username: username,
              role: 'admin',
              createdAt: new Date(),
              updatedAt: new Date()
            });

            showMessage('Admin account created successfully! Logging in...', 'success');
            setTimeout(() => {
              window.location.href = 'pages/admin.html';
            }, 1500);
          } else {
            throw error;
          }
        }
      } catch (error) {
        console.error('Error creating admin:', error);
        showMessage('Error creating admin account: ' + error.message, 'error');
      }
    };

    // Create test user
    window.createTestUser = async () => {
      const email = 'user@test.com';
      const password = 'password123';
      const username = 'Test User';

      try {
        // Check if test user already exists
        try {
          await signInWithEmailAndPassword(auth, email, password);
          showMessage('Test user already exists! Logging in...', 'success');
          setTimeout(() => {
            window.location.href = 'pages/home.html';
          }, 1500);
          return;
        } catch (error) {
          // Test user doesn't exist, create it
          if (error.code === 'auth/user-not-found') {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            
            await updateProfile(userCredential.user, {
              displayName: username
            });

            await setDoc(doc(db, 'users', userCredential.user.uid), {
              email: email,
              username: username,
              role: 'customer',
              createdAt: new Date(),
              updatedAt: new Date()
            });

            showMessage('Test user created successfully! Logging in...', 'success');
            setTimeout(() => {
              window.location.href = 'pages/home.html';
            }, 1500);
          } else {
            throw error;
          }
        }
      } catch (error) {
        console.error('Error creating test user:', error);
        showMessage('Error creating test user: ' + error.message, 'error');
      }
    };

    const isValidEmail = (email) => {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    };

    const showMessage = (message, type) => {
      elements.message.textContent = message;
      elements.message.className = `message ${type}`;
    };

    const clearMessage = () => {
      elements.message.textContent = '';
      elements.message.className = 'message';
    };

    const handleAuthError = (error) => {
      let message = 'An error occurred. Please try again.';
      
      switch (error.code) {
        case 'auth/invalid-email':
          message = 'Invalid email address.';
          break;
        case 'auth/user-disabled':
          message = 'This account has been disabled.';
          break;
        case 'auth/user-not-found':
          message = 'No account found with this email. Please sign up first.';
          break;
        case 'auth/wrong-password':
          message = 'Incorrect password.';
          break;
        case 'auth/email-already-in-use':
          message = 'An account already exists with this email.';
          break;
        case 'auth/weak-password':
          message = 'Password is too weak.';
          break;
        case 'auth/popup-closed-by-user':
          message = 'Sign in cancelled.';
          break;
      }
      
      showMessage(message, 'error');
    };
  </script>
</body>
</html>
