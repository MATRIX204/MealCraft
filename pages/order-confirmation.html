<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Track Order - Meal Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdfcfb 0%, #f9f7f5 100%);
            color: #1e293b;
            min-height: 100vh;
        }

        /* Header - Matching other pages */
        header {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            background: rgba(255,255,255,0.95);
        }

        @media (min-width: 768px) {
            header {
                padding: 15px 50px;
            }
        }

        .logo-top { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 800; 
            cursor: pointer;
            font-size: 1rem;
            color: #1e293b;
        }

        @media (min-width: 768px) {
            .logo-top {
                font-size: 1.1rem;
                gap: 10px;
            }
        }
        
        .mini-logo-card {
            background: linear-gradient(135deg, #f97316, #e67e22);
            width: 32px; 
            height: 32px; 
            border-radius: 8px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.15);
        }
        
        .mini-logo-card img { 
            width: 16px; 
            filter: brightness(0) invert(1);
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .nav-links {
                gap: 25px;
            }
        }

        .nav-links a {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            font-size: 0.85rem;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        @media (min-width: 768px) {
            .nav-links a {
                font-size: 0.95rem;
            }
        }

        .nav-links a:hover {
            color: #f97316;
        }

        .nav-links a i {
            font-size: 0.8rem;
        }

        /* Main Content */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        @media (min-width: 768px) {
            .content-wrapper {
                padding: 40px 20px;
            }
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f1f5f9;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Order Header Card */
        .order-header-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: slideDown 0.5s ease;
        }

        @media (min-width: 768px) {
            .order-header-card {
                border-radius: 24px;
                padding: 30px;
                margin-bottom: 30px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-title h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {
            .order-title h1 {
                font-size: 2rem;
            }
        }

        .order-title p {
            color: #64748b;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .order-id-badge {
            background: #f1f5f9;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #f97316;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .order-id-badge {
                font-size: 1rem;
            }
        }

        .order-id-badge i {
            color: #64748b;
        }

        /* Progress Section */
        .progress-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease 0.1s both;
            overflow-x: auto;
        }

        @media (min-width: 768px) {
            .progress-card {
                border-radius: 24px;
                padding: 40px 60px;
                margin-bottom: 30px;
                overflow-x: visible;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            min-width: 600px;
        }

        @media (min-width: 768px) {
            .progress-steps {
                min-width: 0;
            }
        }

        /* Progress Line - Behind the symbols */
        .progress-line {
            position: absolute;
            top: 35px;
            left: 60px;
            right: 60px;
            height: 4px;
            background: #e2e8f0;
            z-index: 1;
        }

        @media (max-width: 767px) {
            .progress-line {
                top: 30px;
                left: 45px;
                right: 45px;
            }
        }

        .progress-line-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #f97316);
            transition: width 0.5s ease;
            width: 0%;
            position: relative;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 8px #f97316;
            }
        }

        .progress-step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            flex: 1;
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
        }

        .progress-step:nth-child(1) { animation-delay: 0.2s; }
        .progress-step:nth-child(2) { animation-delay: 0.3s; }
        .progress-step:nth-child(3) { animation-delay: 0.4s; }
        .progress-step:nth-child(4) { animation-delay: 0.5s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step-icon {
            width: 60px;
            height: 60px;
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #94a3b8;
            transition: all 0.3s;
            background: white;
            z-index: 3;
        }

        @media (max-width: 767px) {
            .step-icon {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
                border-width: 2px;
            }
        }

        .progress-step.completed .step-icon {
            background: #10b981;
            border-color: #10b981;
            color: white;
            animation: pop 0.5s ease;
        }

        .progress-step.active .step-icon {
            border-color: #f97316;
            color: #f97316;
            background: #fff7ed;
            animation: pulse 1.5s infinite;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(249, 115, 22, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0);
            }
        }

        .step-label {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        @media (min-width: 768px) {
            .step-label {
                font-size: 1rem;
            }
        }

        .step-date {
            color: #64748b;
            font-size: 0.7rem;
        }

        @media (min-width: 768px) {
            .step-date {
                font-size: 0.8rem;
            }
        }

        /* OTP Section */
        .otp-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            display: none;
            animation: slideUp 0.5s ease;
        }

        @media (min-width: 768px) {
            .otp-card {
                border-radius: 24px;
                padding: 30px;
                margin-bottom: 30px;
            }
        }

        .otp-card.active {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .otp-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .otp-header i {
            color: #f97316;
            font-size: 1.2rem;
        }

        .otp-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
        }

        @media (min-width: 768px) {
            .otp-header h2 {
                font-size: 1.5rem;
            }
        }

        .otp-code-box {
            background: linear-gradient(135deg, #fff7ed, #ffedd5);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #fed7aa;
        }

        @media (min-width: 768px) {
            .otp-code-box {
                border-radius: 20px;
                padding: 30px;
            }
        }

        .otp-label {
            color: #f97316;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .otp-digits {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: #1e293b;
            font-family: monospace;
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        @media (min-width: 768px) {
            .otp-digits {
                font-size: 4rem;
                letter-spacing: 15px;
                padding: 20px 40px;
            }
        }

        .otp-note {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        @media (min-width: 768px) {
            .otp-note {
                font-size: 0.9rem;
            }
        }

        /* Delivery Card */
        .delivery-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease 0.3s both;
        }

        @media (min-width: 768px) {
            .delivery-card {
                border-radius: 24px;
                padding: 30px;
                margin-bottom: 30px;
            }
        }

        .delivery-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .delivery-header i {
            color: #f97316;
            font-size: 1.2rem;
        }

        .delivery-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
        }

        @media (min-width: 768px) {
            .delivery-header h2 {
                font-size: 1.5rem;
            }
        }

        .delivery-profile {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid #e2e8f0;
        }

        @media (min-width: 640px) {
            .delivery-profile {
                flex-direction: row;
                align-items: center;
            }
        }

        .delivery-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f97316, #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin: 0 auto;
        }

        @media (min-width: 640px) {
            .delivery-avatar {
                margin: 0;
            }
        }

        .delivery-details {
            flex: 1;
        }

        .delivery-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        @media (min-width: 768px) {
            .delivery-name {
                font-size: 1.5rem;
            }
        }

        .delivery-info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .delivery-info-item i {
            color: #f97316;
            width: 20px;
        }

        /* Order Details Card */
        .order-details-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease 0.4s both;
        }

        @media (min-width: 768px) {
            .order-details-card {
                border-radius: 24px;
                padding: 30px;
                margin-bottom: 30px;
            }
        }

        .details-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .details-header i {
            color: #f97316;
            font-size: 1.2rem;
        }

        .details-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
        }

        @media (min-width: 768px) {
            .details-header h2 {
                font-size: 1.5rem;
            }
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
            gap: 15px;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .item-extras {
            color: #64748b;
            font-size: 0.8rem;
        }

        .item-price {
            font-weight: 700;
            color: #f97316;
            white-space: nowrap;
        }

        .order-summary {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #64748b;
            font-size: 0.95rem;
        }

        .summary-row.total {
            font-weight: 800;
            color: #1e293b;
            font-size: 1.1rem;
            border-top: 2px dashed #e2e8f0;
            padding-top: 15px;
            margin-top: 15px;
        }

        .total-amount {
            color: #f97316;
        }

        .payment-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #fff7ed;
            border-radius: 40px;
            color: #f97316;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        /* Success Message */
        .success-card {
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: white;
            margin-top: 20px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .success-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .success-card p {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* Message Toast */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            padding: 15px 20px;
            border-radius: 40px;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            border-left: 4px solid;
            font-weight: 600;
            font-size: 0.9rem;
        }

        @media (min-width: 768px) {
            .message {
                top: 30px;
                right: 30px;
                left: auto;
                padding: 15px 25px;
                font-size: 1rem;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message.success {
            border-left-color: #10b981;
            color: #065f46;
        }

        .message.error {
            border-left-color: #ef4444;
            color: #991b1b;
        }

        /* Mobile scroll fix */
        @media (max-width: 767px) {
            .progress-card {
                padding: 20px 10px;
            }
            
            .progress-steps {
                padding: 0 10px;
            }
        }

        /* ===== DELIVERY COMPLETE OVERLAY (Customer Screen) ===== */
        .delivery-complete-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #16a34a, #15803d);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            animation: greenFadeIn 0.6s ease;
        }
        .delivery-complete-overlay.active { display: flex; }
        @keyframes greenFadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .delivery-complete-overlay .complete-icon {
            font-size: 7rem;
            color: white;
            margin-bottom: 24px;
            animation: bounceCheckmark 0.8s ease 0.2s both;
        }
        @keyframes bounceCheckmark {
            0% { transform: scale(0) rotate(-15deg); }
            60% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }
        .delivery-complete-overlay h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        .delivery-complete-overlay p {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .delivery-complete-overlay .done-btn {
            background: white;
            color: #16a34a;
            border: none;
            padding: 18px 60px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .delivery-complete-overlay .done-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        /* ===== CANCELLED ORDER CARD ===== */
        .cancelled-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(239,68,68,0.15);
            border: 2px solid #fecaca;
            animation: scaleIn 0.5s ease;
            margin-bottom: 20px;
        }
        .cancelled-banner {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            padding: 30px 24px;
            text-align: center;
            color: white;
        }
        .cancelled-banner .cancel-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: shake 0.5s ease 0.3s both;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(8px) rotate(3deg); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .cancelled-banner h2 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .cancelled-banner p {
            font-size: 1rem;
            opacity: 0.9;
        }
        .cancelled-reason-box {
            padding: 24px;
        }
        .cancelled-reason-box .reason-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cancelled-reason-box .reason-text {
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-left: 4px solid #ef4444;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #991b1b;
            line-height: 1.5;
        }
        .cancelled-reason-box .cancelled-time {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cancelled-cta {
            padding: 0 24px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .cancelled-cta a, .cancelled-cta button {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .cancelled-cta .btn-home {
            background: linear-gradient(135deg, #f97316, #e67e22);
            color: white;
            box-shadow: 0 4px 15px rgba(249,115,22,0.3);
        }
        .cancelled-cta .btn-home:hover { transform: translateY(-2px); }
        .cancelled-cta .btn-reorder {
            background: #f1f5f9;
            color: #374151;
        }
        .cancelled-cta .btn-reorder:hover { background: #e2e8f0; }

        /* OTP card pulse when active */
        .otp-card.active {
            animation: otpPulse 2s ease infinite;
        }
        @keyframes otpPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(249,115,22,0.2); }
            50% { box-shadow: 0 8px 30px rgba(249,115,22,0.4); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-top" onclick="goToHome()">
            <div class="mini-logo-card">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/cutlery.png" alt="Logo">
            </div>
            <strong>Meal Craft</strong>
        </div>
        <nav class="nav-links">
            <a href="home.html"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="profile.html"><i class="fas fa-user"></i> <span>Profile</span></a>
        </nav>
    </header>

    <main class="content-wrapper" id="mainContent">
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p style="color: #64748b;">Loading your order...</p>
        </div>
    </main>

    <div id="message" class="message"></div>


    <!-- ===== DELIVERY COMPLETE OVERLAY (Customer) ===== -->
    <div class="delivery-complete-overlay" id="customerDeliveryComplete">
        <div class="complete-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Delivered! 🎉</h1>
        <p>Your order has been delivered.<br>Enjoy your meal!</p>
        <button class="done-btn" onclick="document.getElementById('customerDeliveryComplete').classList.remove('active'); window.location.href='home.html'">
            <i class="fas fa-home"></i> Go Home
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAT4CDao7eHCFU0OO_dee_m6BpjzKv_308",
            authDomain: "mealcraft-9db35.firebaseapp.com",
            projectId: "mealcraft-9db35",
            messagingSenderId: "1052912873454",
            appId: "1:1052912873454:web:2b794eb8e9524f0ba068ff"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let orderId = null;
        let currentOrder = null;
        let unsubscribe = null;

        // Get order ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        orderId = urlParams.get('id');

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../login.html';
                return;
            }
            currentUser = user;
            
            if (!orderId) {
                window.location.href = 'home.html';
                return;
            }
            
            loadOrder();
        });

        // Load order with real-time updates
        const loadOrder = () => {
            const orderRef = doc(db, 'orders', orderId);
            
            unsubscribe = onSnapshot(orderRef, (doc) => {
                if (!doc.exists()) {
                    showMessage('Order not found', 'error');
                    setTimeout(() => window.location.href = 'home.html', 2000);
                    return;
                }

                const orderData = doc.data();
                
                // Check if order belongs to current user
                if (orderData.userId !== currentUser.uid) {
                    showMessage('You do not have permission to view this order', 'error');
                    setTimeout(() => window.location.href = 'home.html', 2000);
                    return;
                }

                currentOrder = { id: doc.id, ...orderData };
                displayOrder();
            }, (error) => {
                console.error('Error loading order:', error);
                showMessage('Error loading order', 'error');
            });
        };

        // Display order with animations
        const displayOrder = () => {
            const mainContent = document.getElementById('mainContent');

            // ── CANCELLED STATE ─────────────────────────────────────────────────
            if (currentOrder.status === 'cancelled') {
                const reason = currentOrder.cancellationReason || 'No reason provided';
                const cancelledAt = currentOrder.cancelledAt?.toDate
                    ? new Date(currentOrder.cancelledAt.toDate()).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })
                    : '';
                mainContent.innerHTML = `
                    <!-- Order Header -->
                    <div class="order-header-card">
                        <div class="order-title">
                            <h1>Order Cancelled</h1>
                            <p><i class="fas fa-hashtag" style="color:#ef4444;"></i> ${orderId.slice(-8)}</p>
                        </div>
                        <div class="order-id-badge" style="background:#fff5f5;color:#ef4444;">
                            <i class="fas fa-ban"></i>
                            Cancelled
                        </div>
                    </div>

                    <!-- Cancelled Card -->
                    <div class="cancelled-card">
                        <div class="cancelled-banner">
                            <div class="cancel-icon"><i class="fas fa-times-circle"></i></div>
                            <h2>Order Cancelled</h2>
                            <p>We're sorry, your order could not be fulfilled.</p>
                        </div>
                        <div class="cancelled-reason-box">
                            <div class="reason-label"><i class="fas fa-comment-alt"></i> Reason from MealCraft</div>
                            <div class="reason-text">${reason}</div>
                            ${cancelledAt ? `<div class="cancelled-time"><i class="fas fa-clock"></i> Cancelled on ${cancelledAt}</div>` : ''}
                        </div>
                        <div class="cancelled-cta">
                            <button class="btn-home" onclick="window.location.href='home.html'">
                                <i class="fas fa-utensils"></i> Order Again
                            </button>
                            <button class="btn-reorder" onclick="window.location.href='home.html'">
                                <i class="fas fa-home"></i> Go Home
                            </button>
                        </div>
                    </div>

                    <!-- Order Summary (still show what was ordered) -->
                    <div class="order-details-card">
                        <div class="details-header">
                            <i class="fas fa-receipt"></i>
                            <h2>What You Ordered</h2>
                        </div>
                        <div class="order-items">
                            ${currentOrder.items.map(item => `
                                <div class="order-item" style="opacity:0.65;">
                                    <div class="item-info">
                                        <div class="item-name">${item.customName || item.mealName}</div>
                                        <div class="item-extras">${item.selectedIngredients?.map(ing => ing.name).join(', ') || 'No extras'}</div>
                                    </div>
                                    <div class="item-price">₹${item.totalPrice}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="order-summary">
                            <div class="summary-row"><span>Total</span><span class="total-amount">₹${currentOrder.total || 0}</span></div>
                            <div class="payment-badge">
                                <i class="fas fa-${currentOrder.paymentMethod === 'Cash on Delivery' ? 'money-bill' : 'credit-card'}"></i>
                                ${currentOrder.paymentMethod}
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('loadingState').style.display = 'none';
                return;
            }
            // ── END CANCELLED STATE ─────────────────────────────────────────────

            // Get order dates for each status
            const dates = {
                pending: currentOrder.createdAt?.toDate ? new Date(currentOrder.createdAt.toDate()) : new Date(),
                preparing: currentOrder.preparingAt?.toDate ? new Date(currentOrder.preparingAt.toDate()) : null,
                outForDelivery: currentOrder.outForDeliveryAt?.toDate ? new Date(currentOrder.outForDeliveryAt.toDate()) : null,
                delivered: currentOrder.deliveredAt?.toDate ? new Date(currentOrder.deliveredAt.toDate()) : null
            };

            // Determine current step
            const statusOrder = ['pending', 'preparing', 'out-for-delivery', 'delivered'];
            const currentStatus = currentOrder.status || 'pending';
            const currentStepIndex = statusOrder.indexOf(currentStatus);

            // Calculate progress line width
            const progressWidth = ((currentStepIndex) / (statusOrder.length - 1)) * 100;

            // Format date
            const formatDate = (date) => {
                if (!date) return '';
                return date.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            // Get delivery boy info
            const deliveryBoy = currentOrder.deliveryBoyName || 'Not assigned';
            const deliveryVehicle = currentOrder.deliveryVehicle || 'N/A';
            const deliveryPhone = currentOrder.deliveryBoyPhone || 'N/A';

            mainContent.innerHTML = `
                <!-- Order Header -->
                <div class="order-header-card">
                    <div class="order-title">
                        <h1>Track Your Order</h1>
                        <p><i class="fas fa-clock" style="color: #f97316;"></i> Real-time updates</p>
                    </div>
                    <div class="order-id-badge">
                        <i class="fas fa-hashtag"></i>
                        ${orderId.slice(-8)}
                    </div>
                </div>

                <!-- Progress Section -->
                <div class="progress-card">
                    <div class="progress-steps">
                        <div class="progress-line">
                            <div class="progress-line-fill" style="width: ${progressWidth}%;"></div>
                        </div>
                        
                        <div class="progress-step ${currentStepIndex >= 0 ? 'completed' : ''} ${currentStatus === 'pending' ? 'active' : ''}">
                            <div class="step-icon">
                                <i class="fas fa-clipboard-check"></i>
                            </div>
                            <div class="step-label">Pending</div>
                            <div class="step-date">${formatDate(dates.pending)}</div>
                        </div>
                        
                        <div class="progress-step ${currentStepIndex >= 1 ? 'completed' : ''} ${currentStatus === 'preparing' ? 'active' : ''}">
                            <div class="step-icon">
                                <i class="fas fa-utensils"></i>
                            </div>
                            <div class="step-label">Preparing</div>
                            <div class="step-date">${formatDate(dates.preparing)}</div>
                        </div>
                        
                        <div class="progress-step ${currentStepIndex >= 2 ? 'completed' : ''} ${currentStatus === 'out-for-delivery' ? 'active' : ''}">
                            <div class="step-icon">
                                <i class="fas fa-motorcycle"></i>
                            </div>
                            <div class="step-label">Out for Delivery</div>
                            <div class="step-date">${formatDate(dates.outForDelivery)}</div>
                        </div>
                        
                        <div class="progress-step ${currentStepIndex >= 3 ? 'completed' : ''} ${currentStatus === 'delivered' ? 'active' : ''}">
                            <div class="step-icon">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div class="step-label">Delivered</div>
                            <div class="step-date">${formatDate(dates.delivered)}</div>
                        </div>
                    </div>
                </div>

                ${currentStatus === 'out-for-delivery' && currentOrder.otpCode ? `
                    <!-- OTP Section -->
                    <div class="otp-card active">
                        <div class="otp-header">
                            <i class="fas fa-key"></i>
                            <h2>Your OTP Code</h2>
                        </div>
                        <div class="otp-code-box">
                            <div class="otp-label">Share with delivery boy</div>
                            <div class="otp-digits">${currentOrder.otpCode}</div>
                            <div class="otp-note">
                                <i class="fas fa-info-circle"></i>
                                Don't share this code with anyone except the delivery boy
                            </div>
                        </div>
                    </div>
                ` : ''}

                ${currentStatus === 'delivered' ? `
                    <!-- Success Message -->
                    <div class="success-card">
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h2>Enjoy Your Meal!</h2>
                        <p>Thank you for ordering with Meal Craft</p>
                    </div>
                ` : ''}

                <!-- Delivery Info -->
                <div class="delivery-card">
                    <div class="delivery-header">
                        <i class="fas fa-motorcycle"></i>
                        <h2>Delivery Details</h2>
                    </div>
                    <div class="delivery-profile">
                        <div class="delivery-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="delivery-details">
                            <div class="delivery-name">${deliveryBoy}</div>
                            <div class="delivery-info-item">
                                <i class="fas fa-motorcycle"></i>
                                <span>${deliveryVehicle}</span>
                            </div>
                            <div class="delivery-info-item">
                                <i class="fas fa-phone"></i>
                                <span>${deliveryPhone}</span>
                            </div>
                            <div class="delivery-info-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>${currentOrder.address || 'Address not available'}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Details -->
                <div class="order-details-card">
                    <div class="details-header">
                        <i class="fas fa-receipt"></i>
                        <h2>Order Summary</h2>
                    </div>
                    
                    <div class="order-items">
                        ${currentOrder.items.map(item => `
                            <div class="order-item">
                                <div class="item-info">
                                    <div class="item-name">${item.customName || item.mealName}</div>
                                    <div class="item-extras">
                                        ${item.selectedIngredients?.map(ing => ing.name).join(', ') || 'No extras'}
                                    </div>
                                </div>
                                <div class="item-price">₹${item.totalPrice}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="order-summary">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>₹${currentOrder.subtotal || 0}</span>
                        </div>
                        <div class="summary-row">
                            <span>Delivery Fee</span>
                            <span>₹${currentOrder.deliveryFee || 40}</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span class="total-amount">₹${currentOrder.total || 0}</span>
                        </div>
                        
                        <div class="payment-badge">
                            <i class="fas fa-${currentOrder.paymentMethod === 'Cash on Delivery' ? 'money-bill' : 'credit-card'}"></i>
                            ${currentOrder.paymentMethod}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('loadingState').style.display = 'none';
            
            // If already delivered on first load, show overlay
            if (currentOrder?.status === 'delivered' && !previousStatus) {
                // Don't show overlay on initial load for already delivered - just show normal UI
            }
            previousStatus = currentOrder?.status;
        };

        // Clean up listener on page unload
        window.addEventListener('beforeunload', () => {
            if (unsubscribe) {
                unsubscribe();
            }
        });

        // Go to home
        window.goToHome = () => {
            window.location.href = 'home.html';
        };

        // Show message
        const showMessage = (message, type) => {
            const msgDiv = document.getElementById('message');
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            msgDiv.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        };
    </script>
</body>
</html>
